<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6d4aff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Reseller Pocket — Pricing Quotes, Inventory & Reports</title>
  <style>
    :root {
      --purple:#6d4aff;
      --purple-dark:#4d31c7;
      --lavender:#f1edff;
      --pink:#ff5f9e;
      --mint:#dff8eb;
      --green:#168957;
      --yellow:#fff2bd;
      --orange:#ff8a4c;
      --red:#c73838;
      --ink:#202338;
      --muted:#6f7282;
      --line:#e4e6ee;
      --card:#ffffff;
      --bg:#f7f7fb;
      --shadow:0 8px 28px rgba(39,31,92,.10);
      --radius:22px;
    }
    * { box-sizing:border-box; }
    html { -webkit-text-size-adjust:100%; }
    body {
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Inter, ui-rounded, "SF Pro Rounded", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height:100vh;
      padding-bottom:92px;
    }
    button, input, select, textarea { font:inherit; }
    button { -webkit-tap-highlight-color:transparent; }
    .app-shell { max-width:760px; margin:0 auto; min-height:100vh; }
    .topbar {
      position:sticky; top:0; z-index:20;
      background:rgba(247,247,251,.94); backdrop-filter:blur(18px);
      padding:calc(12px + env(safe-area-inset-top)) 18px 12px;
      border-bottom:1px solid rgba(228,230,238,.75);
    }
    .topbar-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand { display:flex; align-items:center; gap:10px; min-width:0; }
    .brand-bubble {
      width:42px; height:42px; border-radius:15px; display:grid; place-items:center;
      background:linear-gradient(145deg,var(--purple),var(--pink)); color:white; font-size:22px;
      box-shadow:0 8px 18px rgba(109,74,255,.25);
    }
    .brand h1 { font-size:18px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .brand p { font-size:12px; color:var(--muted); margin:2px 0 0; }
    .sync-pill { font-size:11px; padding:7px 10px; border-radius:999px; background:var(--mint); color:var(--green); font-weight:800; white-space:nowrap; }
    main { padding:18px; }
    .screen { display:none; animation:fadeIn .18s ease; }
    .screen.active { display:block; }
    @keyframes fadeIn { from { opacity:.35; transform:translateY(4px); } to { opacity:1; transform:none; } }
    .hero {
      background:linear-gradient(145deg,#7656ff 0%,#a24dff 52%,#ff67a2 100%);
      color:white; border-radius:28px; padding:22px; box-shadow:var(--shadow); overflow:hidden; position:relative;
    }
    .hero:after { content:""; position:absolute; width:170px; height:170px; border-radius:50%; right:-55px; top:-70px; background:rgba(255,255,255,.14); }
    .hero small { opacity:.9; font-weight:700; }
    .hero h2 { margin:6px 0 8px; font-size:28px; line-height:1.08; }
    .hero p { margin:0; opacity:.94; line-height:1.45; max-width:90%; }
    .hero-stat { display:flex; gap:12px; margin-top:18px; position:relative; z-index:1; }
    .hero-stat > div { flex:1; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.17); border-radius:17px; padding:12px; }
    .hero-stat strong { display:block; font-size:20px; }
    .hero-stat span { font-size:11px; opacity:.86; }
    .section-title { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:24px 2px 12px; }
    .section-title h2, .section-title h3 { margin:0; }
    .section-title h2 { font-size:22px; }
    .section-title h3 { font-size:17px; }
    .section-title span { font-size:12px; color:var(--muted); }
    .action-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .action-card {
      border:0; background:var(--card); border-radius:22px; padding:18px 14px; min-height:142px;
      text-align:left; color:var(--ink); box-shadow:var(--shadow); display:flex; flex-direction:column; justify-content:space-between;
      transition:transform .1s ease;
    }
    .action-card:active { transform:scale(.98); }
    .action-card .icon { width:52px; height:52px; border-radius:18px; display:grid; place-items:center; font-size:27px; }
    .action-card strong { font-size:17px; display:block; margin-top:12px; }
    .action-card small { color:var(--muted); line-height:1.3; display:block; margin-top:4px; }
    .sell .icon { background:#e7e1ff; }
    .buy .icon { background:#ffe0ee; }
    .inventory .icon { background:#dff8eb; }
    .expense .icon { background:#fff0d6; }
    .create .icon { background:#e9f5ff; }
    .trade .icon { background:#e7f8f5; }
    .trade-value-card { border-left:5px solid #168f83; background:#f1fcfa; }
    .segmented { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:5px; border-radius:17px; background:#f0f1f6; }
    .segment-btn { border:0; border-radius:13px; padding:12px 9px; background:transparent; color:var(--muted); font-weight:900; font-size:12px; }
    .segment-btn.active { background:white; color:var(--purple-dark); box-shadow:0 4px 12px rgba(40,37,78,.10); }
    .value-summary { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:12px; }
    .value-summary > div { border-radius:15px; padding:12px; background:#f7f7fb; }
    .value-summary strong { display:block; font-size:17px; }
    .value-summary span { display:block; font-size:10px; color:var(--muted); margin-top:3px; font-weight:800; }
    .coach-card, .card {
      background:var(--card); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); margin-top:14px;
    }
    .coach-card { border-left:5px solid var(--purple); }
    .coach-card h3 { margin:0 0 7px; font-size:16px; }
    .coach-card p { margin:0; color:var(--muted); line-height:1.5; }
    .backup-warning { border-left-color:var(--orange); background:#fffaf3; }
    .back-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .back-btn { width:42px; height:42px; border:0; border-radius:14px; background:white; box-shadow:var(--shadow); font-size:21px; }
    .screen-heading h2 { margin:0; font-size:24px; }
    .screen-heading p { margin:5px 0 0; color:var(--muted); line-height:1.35; }
    .form-card { background:white; border-radius:24px; padding:18px; box-shadow:var(--shadow); margin-top:14px; }
    .form-card h3 { margin:0 0 14px; font-size:17px; }
    .field { margin-bottom:14px; }
    .field:last-child { margin-bottom:0; }
    label { display:block; font-size:13px; font-weight:800; margin-bottom:7px; color:#3f4252; }
    input, select, textarea {
      width:100%; border:1.5px solid var(--line); background:#fbfbfd; color:var(--ink); border-radius:15px;
      padding:13px 14px; min-height:48px; outline:none; transition:border .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus { border-color:var(--purple); box-shadow:0 0 0 4px rgba(109,74,255,.10); background:white; }
    textarea { resize:vertical; min-height:86px; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    .hint { font-size:11px; color:var(--muted); margin-top:6px; line-height:1.35; }
    .line-card { border:1.5px solid var(--line); border-radius:20px; padding:14px; margin:12px 0; background:#fdfdff; }
    .line-card-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; }
    .line-card-head strong { font-size:15px; }
    .mini-btn { border:0; border-radius:12px; padding:9px 12px; background:var(--lavender); color:var(--purple-dark); font-weight:800; }
    .danger-btn { background:#ffe8e8; color:var(--red); }
    .add-line-btn { width:100%; border:2px dashed #bfb2ff; background:#f6f3ff; color:var(--purple-dark); border-radius:17px; padding:14px; font-weight:900; margin-top:8px; }
    .primary-btn {
      width:100%; border:0; border-radius:18px; padding:16px 18px; color:white; font-weight:900; font-size:16px;
      background:linear-gradient(135deg,var(--purple),#8e55ff); box-shadow:0 10px 22px rgba(109,74,255,.25); margin-top:16px;
    }
    .primary-btn:active { transform:translateY(1px); }
    .secondary-btn { width:100%; border:0; border-radius:16px; padding:14px; background:var(--lavender); color:var(--purple-dark); font-weight:900; margin-top:10px; }
    .price-tip { background:var(--mint); color:var(--green); border-radius:14px; padding:11px 12px; font-size:12px; font-weight:800; margin-top:10px; }
    details { border-top:1px solid var(--line); margin-top:12px; padding-top:10px; }
    summary { cursor:pointer; font-size:13px; font-weight:900; color:var(--purple-dark); }
    .photo-preview { width:78px; height:78px; border-radius:16px; object-fit:cover; background:var(--lavender); display:none; }
    .photo-actions { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:8px; }
    .photo-source-btn { display:flex; align-items:center; justify-content:center; gap:7px; min-height:48px; padding:11px 10px; border-radius:15px; background:var(--lavender); color:var(--purple-dark); font-size:12px; font-weight:900; text-align:center; cursor:pointer; }
    .photo-source-btn input { display:none; }
    .photo-preview-row { display:flex; align-items:center; gap:11px; margin-top:10px; padding:9px; border-radius:17px; background:#f7f7fb; }
    .photo-preview-row .photo-preview { display:block; flex:0 0 auto; }
    .photo-preview-row > div { min-width:0; }
    .photo-preview-row small { display:block; color:var(--muted); line-height:1.35; margin-bottom:6px; }

    .search-row { display:flex; gap:9px; margin:12px 0; }
    .search-row input { flex:1; }
    .search-row select { width:135px; }
    .inventory-list { display:grid; gap:12px; }
    .inventory-card { background:white; border-radius:21px; padding:14px; box-shadow:var(--shadow); display:grid; grid-template-columns:64px 1fr; gap:13px; }
    .item-photo { width:64px; height:64px; border-radius:18px; object-fit:cover; background:var(--lavender); display:grid; place-items:center; font-size:31px; }
    .item-main { min-width:0; }
    .item-top { display:flex; justify-content:space-between; gap:8px; align-items:start; }
    .item-top h3 { margin:0; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-top small { color:var(--muted); display:block; margin-top:3px; }
    .stock-pill { padding:6px 9px; border-radius:999px; background:var(--mint); color:var(--green); font-size:11px; font-weight:900; white-space:nowrap; }
    .stock-pill.watch { background:var(--yellow); color:#8a6500; }
    .stock-pill.slow { background:#ffe8e8; color:var(--red); }
    .item-numbers { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-top:11px; }
    .item-numbers div { background:#f7f7fb; border-radius:12px; padding:8px; }
    .item-numbers strong { display:block; font-size:13px; }
    .item-numbers span { display:block; color:var(--muted); font-size:9px; margin-top:2px; }
    .action-note { font-size:11px; color:var(--muted); margin-top:9px; line-height:1.35; }
    .empty { text-align:center; padding:35px 18px; background:white; border-radius:24px; box-shadow:var(--shadow); }
    .empty .big { font-size:46px; }
    .empty h3 { margin:8px 0 5px; }
    .empty p { color:var(--muted); margin:0; line-height:1.4; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    .stat-card { background:white; border-radius:20px; padding:15px; box-shadow:var(--shadow); }
    .stat-card span { display:block; font-size:11px; color:var(--muted); font-weight:700; }
    .stat-card strong { display:block; font-size:22px; margin-top:5px; }
    .stat-card.good strong { color:var(--green); }
    .stat-card.warn strong { color:#a16c00; }
    .progress-track { width:100%; height:12px; border-radius:999px; background:#ececf4; overflow:hidden; margin-top:10px; }
    .progress-fill { height:100%; border-radius:inherit; background:linear-gradient(90deg,var(--purple),var(--pink)); min-width:2px; }
    .rank-row { display:grid; grid-template-columns:35px 1fr auto; gap:10px; align-items:center; padding:11px 0; border-bottom:1px solid var(--line); }
    .rank-row:last-child { border-bottom:0; }
    .rank { width:30px; height:30px; display:grid; place-items:center; border-radius:11px; background:var(--lavender); color:var(--purple-dark); font-weight:900; }
    .rank-row strong { font-size:14px; }
    .rank-row small { display:block; color:var(--muted); margin-top:2px; }
    .rank-value { font-weight:900; color:var(--green); }
    .bar-row { margin:13px 0; }
    .bar-label { display:flex; justify-content:space-between; font-size:12px; font-weight:800; margin-bottom:6px; gap:10px; }
    .bar { height:12px; border-radius:999px; background:#ececf4; overflow:hidden; }
    .bar > div { height:100%; border-radius:inherit; background:linear-gradient(90deg,#7a5aff,#ff6aa5); }
    .locked { text-align:center; padding:30px 18px; }
    .lock-icon { width:76px; height:76px; border-radius:25px; background:var(--lavender); display:grid; place-items:center; font-size:38px; margin:0 auto 14px; }
    .parent-tabs { display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin:14px 0; scrollbar-width:none; }
    .parent-tabs::-webkit-scrollbar { display:none; }
    .tab-btn { flex:0 0 auto; border:0; border-radius:999px; padding:10px 13px; background:white; color:var(--muted); box-shadow:0 4px 14px rgba(40,37,78,.07); font-size:12px; font-weight:900; }
    .tab-btn.active { background:var(--purple); color:white; }
    .parent-panel { display:none; }
    .parent-panel.active { display:block; }
    .record-row { background:white; border-radius:17px; padding:13px; margin-bottom:10px; box-shadow:0 5px 18px rgba(40,37,78,.07); }
    .record-row-top { display:flex; align-items:start; justify-content:space-between; gap:8px; }
    .record-row h4 { margin:0; font-size:14px; }
    .record-row p { margin:4px 0 0; color:var(--muted); font-size:11px; line-height:1.35; }
    .record-amount { font-weight:900; white-space:nowrap; }
    .record-actions { display:flex; justify-content:flex-end; flex-wrap:wrap; gap:8px; margin-top:9px; }
    .inline-actions { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
    .file-btn { display:block; text-align:center; padding:14px; border-radius:16px; background:var(--lavender); color:var(--purple-dark); font-weight:900; cursor:pointer; }
    .file-btn input { display:none; }
    .toast {
      position:fixed; left:50%; bottom:98px; transform:translateX(-50%) translateY(25px);
      background:#202338; color:white; border-radius:16px; padding:13px 16px; max-width:calc(100vw - 36px); width:max-content;
      box-shadow:0 12px 35px rgba(0,0,0,.23); z-index:100; opacity:0; pointer-events:none; transition:.24s ease; font-size:13px; font-weight:800; text-align:center;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .bottom-nav {
      position:fixed; z-index:30; bottom:0; left:0; right:0; padding:8px 10px calc(8px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.96); backdrop-filter:blur(20px); border-top:1px solid var(--line);
    }
    .nav-inner { max-width:760px; margin:0 auto; display:grid; grid-template-columns:repeat(5,1fr); }
    .nav-btn { border:0; background:transparent; color:#8a8d9a; min-height:58px; border-radius:16px; font-size:10px; font-weight:800; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
    .nav-btn b { font-size:21px; line-height:1; }
    .nav-btn.active { color:var(--purple); background:var(--lavender); }
    .modal {
      position:fixed; inset:0; z-index:200; display:none; align-items:flex-end; justify-content:center; background:rgba(28,27,42,.48); padding:15px;
    }
    .modal.show { display:flex; }
    .modal-card { background:white; border-radius:28px; padding:21px; width:min(620px,100%); max-height:92vh; overflow:auto; box-shadow:0 20px 60px rgba(0,0,0,.28); }
    .modal-card h2 { margin:0 0 6px; }
    .modal-card > p { color:var(--muted); margin:0 0 18px; line-height:1.4; }
    .welcome-logo { width:72px; height:72px; border-radius:24px; display:grid; place-items:center; font-size:38px; color:white; margin-bottom:14px; background:linear-gradient(145deg,var(--purple),var(--pink)); }
    .tiny { font-size:10px; color:var(--muted); line-height:1.35; }
    .hidden { display:none !important; }

    .ledger .icon { background:#e8efff; }
    .reports .icon { background:#f3e8ff; }
    .variation-box { margin-top:12px; border:1.5px solid #ded8f5; border-radius:18px; padding:12px; background:#faf9ff; }
    .variation-box-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .variation-box-head strong { font-size:13px; }
    .variation-row { display:grid; grid-template-columns:minmax(0,1fr) 84px 40px; gap:8px; align-items:end; padding:9px 0; border-bottom:1px solid #ebe8f5; }
    .variation-row:last-child { border-bottom:0; }
    .variation-row .field { margin:0; }
    .variation-row button { min-height:47px; padding:0; }
    .variation-total { margin-top:9px; padding:9px 11px; border-radius:13px; font-size:11px; font-weight:850; background:#f0f1f6; color:var(--muted); }
    .variation-total.ok { background:var(--mint); color:var(--green); }
    .restock-note { margin-top:9px; padding:10px 12px; border-radius:14px; background:#eef7ff; color:#245a88; font-size:11px; font-weight:800; }
    .inventory-card.grouped { grid-template-columns:64px minmax(0,1fr); }
    .variant-stock-list { display:grid; gap:7px; margin-top:11px; }
    .variant-stock-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; align-items:center; padding:9px 10px; border-radius:13px; background:#f7f7fb; }
    .variant-stock-row strong { font-size:12px; }
    .variant-stock-row small { display:block; color:var(--muted); margin-top:2px; }
    .variant-stock-row b { font-size:13px; color:var(--purple-dark); white-space:nowrap; }
    .lot-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:11px; }
    .lot-row:last-child { border-bottom:0; }
    .pricing-mode-card { border:1.5px solid #dcd5ff; background:#faf9ff; }
    .allocation-note { background:#eef7ff; color:#245a88; border-radius:14px; padding:11px 12px; font-size:11px; font-weight:800; line-height:1.4; margin-top:10px; }
    .report-tabs { display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; margin:14px 0; padding-bottom:3px; }
    .report-tabs::-webkit-scrollbar { display:none; }
    .report-tab { flex:0 0 auto; border:0; border-radius:999px; padding:10px 13px; background:white; color:var(--muted); box-shadow:0 4px 14px rgba(40,37,78,.07); font-size:12px; font-weight:900; }
    .report-tab.active { background:var(--purple); color:white; }
    .report-list { display:grid; gap:10px; }
    .report-row { background:white; border-radius:18px; padding:14px; box-shadow:0 5px 18px rgba(40,37,78,.07); }
    .report-row-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    .report-row h4 { margin:0; font-size:14px; }
    .report-row p { margin:4px 0 0; color:var(--muted); font-size:11px; line-height:1.4; }
    .report-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:10px; }
    .report-metrics > div { background:#f7f7fb; border-radius:12px; padding:8px; }
    .report-metrics strong { display:block; font-size:12px; }
    .report-metrics span { display:block; color:var(--muted); font-size:9px; font-weight:800; margin-top:2px; }
    .ledger-filters { display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; margin:12px 0; }
    .ledger-filters::-webkit-scrollbar { display:none; }
    .ledger-filter { flex:0 0 auto; border:0; border-radius:999px; padding:9px 12px; background:white; color:var(--muted); font-size:11px; font-weight:900; box-shadow:0 4px 14px rgba(40,37,78,.07); }
    .ledger-filter.active { background:var(--purple); color:white; }
    .ledger-date { margin:18px 2px 8px; color:var(--muted); font-size:12px; font-weight:900; }
    .ledger-badge { display:inline-block; border-radius:999px; padding:5px 8px; font-size:9px; font-weight:900; background:var(--lavender); color:var(--purple-dark); margin-bottom:5px; }
    .ledger-badge.sale { background:var(--mint); color:var(--green); }
    .ledger-badge.expense { background:#fff0d6; color:#9a4d00; }
    .ledger-badge.trade { background:#e7f8f5; color:#16776e; }
    .ledger-badge.money { background:#eef7ff; color:#245a88; }
    .negative { color:var(--red) !important; }
    .positive { color:var(--green) !important; }
    .quote .icon { background:#fff2bd; }
    .quote-targets { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px; }
    .quote-target-btn { border:0; border-radius:14px; padding:12px 8px; background:#f0f1f6; color:var(--muted); font-size:12px; font-weight:900; }
    .quote-target-btn.active { background:var(--purple); color:white; box-shadow:0 6px 16px rgba(109,74,255,.20); }

<script>
'use strict';

const STORAGE_KEY = 'teen_reseller_pocket_v1';
const CLOUD_CONFIG_KEY = 'teen_reseller_cloud_config_v1';
const CATEGORIES = ['Handmade / Floral','Clothing','Shoes','Accessories','Beauty','Collectibles','Electronics','Home','Toys','Other'];
const PLATFORMS = ['Instagram','TikTok','Facebook Marketplace','Depop','Poshmark','Mercari','eBay','In Person','Other'];
const EXPENSE_CATEGORIES = ['Packaging','Shipping','Advertising','Equipment','Supplies','Travel / Mileage','Phone / Internet','Refunds','Other'];
const PAID_BY = ['Parent Loan','Business Cash','Gift / Free','Personal'];
const RECEIVED_DISPOSITIONS = ['Add to inventory for resale','Keep or use — count as non-cash trade value'];
const MONEY_TYPES = ['Additional Parent Cash Advance','Repayment to Parent','Owner Deposit','Owner Withdrawal'];
const METHODS = ['Cash','Venmo','Cash App','PayPal','Zelle','Bank Transfer','Other'];
const QUOTE_TARGETS = [20,30,40];

const DEFAULT_STATE = {
  version:6,
  meta:{modifiedAt:''},
  setupComplete:false,
  settings:{
    businessName:'Reseller Pocket', daughterName:'', parentName:'Parent', pin:'2468',
    defaultFeePercent:15, defaultFixedFee:0, defaultShipping:0, defaultPackaging:0.75,
    targetMargin:40, lowMargin:20, slowDays:60, watchDays:30, defaultLaborRate:12, startingLoan:0, autoApplySalesToLoan:true, lastBackup:''
  },
  purchases:[],
  sales:[],
  trades:[],
  expenses:[],
  money:[],
  quotes:[],
  counters:{purchase:0,sale:0,trade:0,expense:0,money:0,item:0,quote:0}
};

let state = loadState();
let parentUnlocked = false;
let purchaseDraft = [];
let createdDraft = [];
let tradeGiveDraft = [];
let tradeReceiveDraft = [];
let saleDraft = [];
let purchaseMeta = {date:'',paidBy:'Parent Loan',source:''};
let createdMeta = {date:'',paidBy:'Parent Loan'};
let tradeMeta = {date:'',partner:'',notes:''};
let saleMeta = {date:'',status:'Paid',platform:'Instagram',notes:'',pricingMode:'line',orderItemTotal:'',delivery:false,deliveryLocation:'',deliveryFee:'',gasCost:'',gasPaidBy:'Business Cash'};
let expenseDraft = {date:'',category:'Packaging',description:'',amount:'',paidBy:'Business Cash',vendor:'',notes:''};
let quoteDraft = [];
let quoteMeta = null;
let editingQuoteId = '';
let quotePreview = null;
let quoteViewingId = '';
let editingPurchaseId = '';
let editingTradeId = '';
let editingSaleId = '';
let editingExpenseId = '';
let editingMoneyId = '';
let currentParentTab = 'summary';
let currentReportTab = 'overview';
let currentLedgerFilter = 'all';
let toastTimer;
let currentScreen = 'homeScreen';
let cloudConfig = loadCloudConfig();
let supabaseClient = null;
let cloudUser = null;
let cloudChannel = null;
let cloudPushTimer = null;
let cloudSyncInProgress = false;
let cloudStatus = 'phone';
let cloudStatusMessage = 'Saved on phone';
let cloudModalFromOnboarding = false;
let cloudCheckTimer = null;

function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
function normalizeState(saved){
  const source=saved&&typeof saved==='object'?saved:{};
  const rawPurchases=Array.isArray(source.purchases)?source.purchases:[];
  const purchases=rawPurchases.map(p=>({
    ...p,
    productKey:p.productKey||normalizeProductTitle(p.name),
    productLineId:p.productLineId||p.itemId||p.id,
    variant:cleanVariant(p.variant)
  }));
  const purchaseMap=new Map(purchases.map(p=>[p.itemId,p]));
  const sales=(Array.isArray(source.sales)?source.sales:[]).map(sale=>({
    ...sale,
    pricingMode:sale.pricingMode||'line',
    orderItemTotal:sale.orderItemTotal??'',
    lines:(sale.lines||[]).map(line=>{
      const firstAllocation=(line.allocations||[])[0];
      const p=purchaseMap.get(firstAllocation?.itemId||line.itemId);
      return {
        ...line,
        productKey:line.productKey||p?.productKey||normalizeProductTitle(line.productName||p?.name),
        productName:line.productName||p?.name||'',
        variant:cleanVariant(line.variant||p?.variant),
        allocations:Array.isArray(line.allocations)?line.allocations:undefined
      };
    })
  }));
  return {
    ...clone(DEFAULT_STATE), ...source, version:6,
    meta:{...clone(DEFAULT_STATE.meta), ...(source.meta||{})},
    settings:{...clone(DEFAULT_STATE.settings), ...(source.settings||{})},
    counters:{...clone(DEFAULT_STATE.counters), ...(source.counters||{})},
    purchases,
    sales,
    trades:Array.isArray(source.trades)?source.trades:[],
    expenses:Array.isArray(source.expenses)?source.expenses:[],
    money:Array.isArray(source.money)?source.money:[],
    quotes:(Array.isArray(source.quotes)?source.quotes:[]).map(q=>({...q,lines:(q.lines||[]).map(l=>({...l,id:l.id||stableLocalId('QL'),variant:String(l.variant||''),qty:l.qty??1,costEach:l.costEach??'',priceEach:l.priceEach??'',manualPrice:Boolean(l.manualPrice)}))}))
  };
}
function loadState(){
  try {
    const raw=localStorage.getItem(STORAGE_KEY);
    return raw?normalizeState(JSON.parse(raw)):clone(DEFAULT_STATE);
  } catch(e){ console.error(e); return clone(DEFAULT_STATE); }
}
function loadCloudConfig(){
  let saved={};
  try{ saved=JSON.parse(localStorage.getItem(CLOUD_CONFIG_KEY)||'{}')||{}; }catch(e){}
  const embedded=window.RESELLER_CLOUD_CONFIG||{};
  return {
    url:embedded.url||saved.url||'',
    anonKey:embedded.anonKey||embedded.publishableKey||saved.anonKey||'',
    deviceName:saved.deviceName||'',
    lastSyncAt:saved.lastSyncAt||'',
    lastBackupDate:saved.lastBackupDate||''
  };
}
function saveCloudConfig(){ localStorage.setItem(CLOUD_CONFIG_KEY,JSON.stringify(cloudConfig)); }
function saveState(options={}){
  if(!options.preserveModified) state.meta.modifiedAt=new Date().toISOString();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  renderHeader();
  if(!options.skipCloud) scheduleCloudPush();
}
function esc(v){ return String(v??'').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function money(v){ return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(Number(v)||0); }
function pct(v){ return `${(Number(v)||0).toFixed(1)}%`; }
function num(v){ return Number(String(v??'').replace(',','.'))||0; }
function round2(v){ const n=num(v); return Math.round((n+Number.EPSILON)*100)/100; }
function round4(v){ const n=num(v); return Math.round((n+Number.EPSILON)*10000)/10000; }
function normalizeProductTitle(v){ return String(v||'').trim().replace(/\s+/g,' ').toLowerCase(); }
function cleanVariant(v){ const x=String(v||'').trim().replace(/\s+/g,' '); return x||'Unspecified'; }
function sameVariant(a,b){ return cleanVariant(a).toLowerCase()===cleanVariant(b).toLowerCase(); }
function stableLocalId(prefix='ID'){ return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`; }
function today(){ return new Date().toISOString().slice(0,10); }
function displayDate(d){ if(!d) return ''; const [y,m,day]=d.split('-'); return `${m}/${day}/${y}`; }
function daysBetween(dateStr){ if(!dateStr) return 0; return Math.max(0,Math.floor((new Date()-new Date(dateStr+'T00:00:00'))/86400000)); }
function nextId(type,prefix){ state.counters[type]=(state.counters[type]||0)+1; return `${prefix}-${String(state.counters[type]).padStart(3,'0')}`; }
function categoryIcon(cat){ return ({'Handmade / Floral':'🌸',Clothing:'👕',Shoes:'👟',Accessories:'👜',Beauty:'💄',Collectibles:'🧸',Electronics:'🎧',Home:'🏠',Toys:'🪀',Other:'✨'})[cat]||'✨'; }
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),3200);
}
function options(arr,selected=''){ return arr.map(x=>`<option value="${esc(x)}" ${x===selected?'selected':''}>${esc(x)}</option>`).join(''); }
function photoPicker(photo,changeHandler,removeHandler){
  return `<div class="field" style="margin-top:12px"><label>Item photo</label>
    <div class="photo-actions">
      <label class="photo-source-btn">📷 Take photo<input type="file" accept="image/*" capture="environment" onchange="${changeHandler}"></label>
      <label class="photo-source-btn">🖼️ Choose from phone<input type="file" accept="image/*" onchange="${changeHandler}"></label>
    </div>
    ${photo?`<div class="photo-preview-row"><img class="photo-preview" src="${photo}" alt="Item photo"><div><small>Photo saved with this item.</small><button type="button" class="mini-btn danger-btn" onclick="${removeHandler}">Remove photo</button></div></div>`:`<div class="hint">Use the camera or select an existing picture from Photos, Gallery, Files, or another photo app.</div>`}
  </div>`;
}
function suggestedPrice(unitCost){
  const s=state.settings, fee=num(s.defaultFeePercent)/100, margin=num(s.targetMargin)/100;
  const denominator=1-fee-margin;
  if(unitCost<=0 || denominator<=0) return 0;
  const raw=(num(unitCost)+num(s.defaultFixedFee)+num(s.defaultShipping)+num(s.defaultPackaging))/denominator;
  return Math.max(0, Math.ceil(raw)-0.01);
}
function getPurchase(itemId){ return state.purchases.find(p=>p.itemId===itemId); }
function productKeyFor(p){ return p?.productKey||normalizeProductTitle(p?.name); }
function saleLineAllocations(line){
  if(Array.isArray(line?.allocations)&&line.allocations.length) return line.allocations;
  return line?.itemId?[{itemId:line.itemId,qty:num(line.qty),unitCost:num(getPurchase(line.itemId)?.unitCost)}]:[];
}
function lineAllocatedQtyForItem(line,itemId){ return saleLineAllocations(line).filter(a=>a.itemId===itemId).reduce((sum,a)=>sum+num(a.qty),0); }
function saleLineProduct(line){
  const first=saleLineAllocations(line)[0],p=getPurchase(first?.itemId||line?.itemId);
  return {productKey:line?.productKey||productKeyFor(p),name:line?.productName||p?.name||'Unknown item',category:line?.category||p?.category||'Other',variant:cleanVariant(line?.variant||p?.variant)};
}
function lineGross(line){ return line?.allocatedTotal!==undefined&&line?.allocatedTotal!==''?num(line.allocatedTotal):num(line?.qty)*num(line?.priceEach); }
function lineCostBasis(line){
  const allocations=saleLineAllocations(line);
  if(allocations.length) return allocations.reduce((sum,a)=>sum+num(a.qty)*num(a.unitCost??getPurchase(a.itemId)?.unitCost),0);
  const lots=state.purchases.filter(p=>productKeyFor(p)===(line?.productKey||'')&&sameVariant(p.variant,line?.variant));
  const availableLots=lots.map(p=>({p,onHand:availableQtyFor(p.itemId,{excludeSaleId:editingSaleId})})).filter(x=>x.onHand>0);
  const source=availableLots.length?availableLots:lots.map(p=>({p,onHand:num(p.qty)}));
  const q=source.reduce((a,x)=>a+x.onHand,0),avg=q?source.reduce((a,x)=>a+x.onHand*num(x.p.unitCost),0)/q:num(getPurchase(line?.itemId)?.unitCost);
  return num(line?.qty)*avg;
}
function computeLine(line){
  const gross=lineGross(line);
  const fees=num(line?.fee), shipping=num(line?.shipping), packaging=num(line?.packaging);
  const net=gross-fees-shipping-packaging;
  const cogs=lineCostBasis(line);
  const profit=net-cogs;
  return {gross,fees,shipping,packaging,net,cogs,profit,margin:gross?profit/gross*100:0};
}
function computeSale(sale){
  const lineResults=(sale?.lines||[]).map(computeLine);
  const itemGross=lineResults.reduce((a,x)=>a+x.gross,0);
  const itemNet=lineResults.reduce((a,x)=>a+x.net,0);
  const itemProfit=lineResults.reduce((a,x)=>a+x.profit,0);
  const deliveryFee=num(sale?.deliveryFee);
  return {gross:itemGross+deliveryFee,net:itemNet+deliveryFee,profitBeforeExpenses:itemProfit+deliveryFee,deliveryFee,gasCost:num(sale?.gasCost),profitAfterDelivery:itemProfit+deliveryFee-num(sale?.gasCost)};
}

function activeSales(){ return state.sales.filter(s=>s.status!=='Canceled / Returned'); }
function inventoryCashCost(p){
  if(p?.sourceType==='Created') return num(p.cashCost ?? p.materialsCost);
  if(p?.sourceType==='Trade Received') return 0;
  return num(p?.cashCost ?? p?.totalCost);
}
function sourceLabel(p){
  if(p?.sourceType==='Created') return 'Made by her';
  if(p?.sourceType==='Trade Received') return 'Received in trade';
  return 'Purchased';
}
function soldQty(itemId,excludeSaleId=''){
  return activeSales().filter(s=>s.saleId!==excludeSaleId).reduce((sum,s)=>sum+(s.lines||[]).reduce((a,l)=>a+lineAllocatedQtyForItem(l,itemId),0),0);
}
function tradedQty(itemId,excludeTradeId=''){

function productGroups({excludeSaleId='',excludeTradeId='',includeSold=true}={}){
  const map=new Map();
  state.purchases.forEach(p=>{
    const key=productKeyFor(p); if(!key) return;
    if(!map.has(key)) map.set(key,{key,name:p.name,category:p.category,photo:p.photo||'',lots:[],qty:0,onHand:0,sold:0,traded:0,value:0});
    const g=map.get(key),stats={sold:soldQty(p.itemId,excludeSaleId),traded:tradedQty(p.itemId,excludeTradeId)};
    const onHand=Math.max(0,num(p.qty)-stats.sold-stats.traded);
    g.lots.push({...p,onHand,sold:stats.sold,traded:stats.traded});g.qty+=num(p.qty);g.onHand+=onHand;g.sold+=stats.sold;g.traded+=stats.traded;g.value+=onHand*num(p.unitCost);
    if(!g.photo&&p.photo)g.photo=p.photo;

  const groups=[...map.values()];

function getProductGroup(key,options={}){ return productGroups(options).find(g=>g.key===key); }

function referencePriceFor(productKey,variant){

function itemStats(p){
  const sold=soldQty(p.itemId), traded=tradedQty(p.itemId), onHand=Math.max(0,num(p.qty)-sold-traded), days=daysBetween(p.date);
  let revenue=0,profit=0;
  activeSales().forEach(s=>(s.lines||[]).forEach(l=>{
    const allocated=lineAllocatedQtyForItem(l,p.itemId); if(!allocated)return;
    const qty=Math.max(1,num(l.qty)),share=allocated/qty,c=computeLine(l);
    revenue+=c.gross*share;
    const allocationCost=saleLineAllocations(l).filter(a=>a.itemId===p.itemId).reduce((sum,a)=>sum+num(a.qty)*num(a.unitCost??p.unitCost),0);
    profit+=(c.gross-c.fees-c.shipping-c.packaging)*share-allocationCost;

  let status='Active';

}
function totals(){
  const saleResults=activeSales().map(computeSale);
  const totalSales=saleResults.reduce((a,x)=>a+x.gross,0);
  const grossProfit=saleResults.reduce((a,x)=>a+x.profitBeforeExpenses,0);
  const expenses=state.expenses.reduce((a,x)=>a+num(x.amount),0);
  const netProfit=grossProfit-expenses;
  const paidCash=state.sales.filter(s=>s.status==='Paid').reduce((a,s)=>a+computeSale(s).net,0);
  const pendingCash=state.sales.filter(s=>s.status==='Pending').reduce((a,s)=>a+computeSale(s).net,0);
  const parentInventory=state.purchases.filter(p=>p.paidBy==='Parent Loan').reduce((a,p)=>a+inventoryCashCost(p),0);
  const parentExpenses=state.expenses.filter(e=>e.paidBy==='Parent Loan').reduce((a,e)=>a+num(e.amount),0);
  const advances=state.money.filter(m=>m.type==='Additional Parent Cash Advance').reduce((a,m)=>a+num(m.amount),0);
  const manualRepayments=state.money.filter(m=>m.type==='Repayment to Parent').reduce((a,m)=>a+num(m.amount),0);
  const loanFunded=num(state.settings.startingLoan)+parentInventory+parentExpenses+advances;
  const businessPurchases=state.purchases.filter(p=>p.paidBy==='Business Cash').reduce((a,p)=>a+inventoryCashCost(p),0);
  const businessExpenses=state.expenses.filter(e=>e.paidBy==='Business Cash').reduce((a,e)=>a+num(e.amount),0);
  const ownerDeposits=state.money.filter(m=>m.type==='Owner Deposit').reduce((a,m)=>a+num(m.amount),0);
  const withdrawals=state.money.filter(m=>m.type==='Owner Withdrawal').reduce((a,m)=>a+num(m.amount),0);
  const availableSaleCashForLoan=Math.max(0,paidCash-businessPurchases-businessExpenses);
  const automaticRepayment=state.settings.autoApplySalesToLoan?Math.min(Math.max(0,loanFunded-manualRepayments),availableSaleCashForLoan):0;
  const repayments=manualRepayments+automaticRepayment;
  const loanBalance=Math.max(0,loanFunded-repayments);
  const businessCash=paidCash-businessPurchases-businessExpenses+advances+ownerDeposits-manualRepayments-automaticRepayment-withdrawals;
  const freeCash=Math.max(0,businessCash-loanBalance);
  const inventory=state.purchases.map(p=>({p,...itemStats(p)}));
  const unitsOnHand=inventory.reduce((a,x)=>a+x.onHand,0);
  const unitsSold=inventory.reduce((a,x)=>a+x.sold,0);
  const unitsTraded=inventory.reduce((a,x)=>a+x.traded,0);
  const inventoryValue=inventory.reduce((a,x)=>a+x.value,0);
  const avgMargin=totalSales?grossProfit/totalSales*100:0;
  const personalTradeValue=state.trades.reduce((a,t)=>a+(t.receiveLines||[]).filter(l=>l.disposition==='Keep or use — count as non-cash trade value').reduce((b,l)=>b+num(l.qty)*num(l.valueEach),0),0);
  const tradeGivenValue=state.trades.reduce((a,t)=>a+(t.giveLines||[]).reduce((b,l)=>b+num(l.qty)*num(l.valueEach),0),0);
  const tradeReceivedValue=state.trades.reduce((a,t)=>a+(t.receiveLines||[]).reduce((b,l)=>b+num(l.qty)*num(l.valueEach),0),0);
  const tradeValueDifference=tradeReceivedValue-tradeGivenValue;
  return {totalSales,grossProfit,expenses,netProfit,paidCash,pendingCash,loanFunded,manualRepayments,automaticRepayment,repayments,loanBalance,businessCash,freeCash,inventoryValue,unitsOnHand,unitsSold,unitsTraded,avgMargin,inventory,personalTradeValue,tradeGivenValue,tradeReceivedValue,tradeValueDifference};
}

  if(t.avgMargin<num(state.settings.lowMargin)&&state.sales.length) return 'Your average cash-sale margin is low. Try slightly higher prices or lower material and sourcing costs.';

function canvasRoundRect(ctx,x,y,w,h,r){ctx.beginPath();if(typeof ctx.roundRect==='function')ctx.roundRect(x,y,w,h,r);else{ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);}ctx.fill();}

}

function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader(); reader.onerror=reject;
    reader.onload=()=>{
      const img=new Image(); img.onerror=reject;
      img.onload=()=>{
        const max=320, scale=Math.min(1,max/Math.max(img.width,img.height));
        const canvas=document.createElement('canvas'); canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',.62));
      }; img.src=reader.result;
    }; reader.readAsDataURL(file);
  });
}

    supabaseClient.auth.onAuthStateChange((_event,session)=>{

      if(cloudUser){ setCloudStatus('syncing','Connecting to shared business data…'); if(previous!==cloudUser.id){subscribeCloudChanges();syncCloudNow({showToast:false});} }

    <div class="back-row"><button class="back-btn" onclick="closeCloudModal()">←</button><div class="screen-heading"><h2>Cloud Sync</h2><p>Keep the same inventory and sales on every family phone.</p></div></div>
    <div class="form-card cloud-status-card">
      <div class="cloud-status-row"><strong><span class="cloud-dot ${signedIn?'connected':cloudStatus==='syncing'?'syncing':cloudStatus==='error'?'error':''}"></span>${signedIn?'Connected to the family account':configured?'Project ready — sign in':'Cloud project not configured'}</strong><span class="status-badge">${esc(cloudConfig.deviceName||'This phone')}</span></div>
      <p class="cloud-small">${signedIn?`Signed in as ${esc(cloudUser.email||'family account')}. The app checks for updates when it opens, returns to the foreground, comes online, every 30 seconds, and through live database updates.`:'Use one shared family email and password on all three phones.'}</p>
    </div>
    <div class="form-card">
      <h3>1. Cloud project</h3>
      <div class="field"><label>Supabase project URL</label><input id="cloudUrl" value="${esc(cloudConfig.url)}" ${embedded?'readonly':''} placeholder="https://your-project.supabase.co"></div>
      <div class="field"><label>Public anon / publishable key</label><textarea id="cloudAnonKey" ${embedded?'readonly':''} placeholder="Paste the public project key">${esc(cloudConfig.anonKey)}</textarea></div>
      <div class="field"><label>Name this device</label><input id="cloudDeviceName" value="${esc(cloudConfig.deviceName)}" placeholder="Example: Her phone, Mom's phone"></div>
      <button class="secondary-btn" onclick="saveCloudProjectSettings()">Save Project Settings</button>
      <div class="hint">The URL and public key are connection settings, not the private service-role key. Never paste a service-role key into the app.</div>
    </div>
    <div class="form-card">
      <h3>2. Family account</h3>
      ${signedIn?`<p class="hint">Use this same family account on the other phones.</p><div class="cloud-actions"><button class="primary-btn" onclick="syncCloudNow({showToast:true})">Sync Now</button><button class="secondary-btn" onclick="cloudSignOut()">Sign Out</button></div>`:`
      <div class="field"><label>Family email</label><input id="cloudEmail" type="email" autocomplete="email" placeholder="A parent-controlled email"></div>
      <div class="field"><label>Family password</label><input id="cloudPassword" type="password" autocomplete="current-password" placeholder="At least 6 characters"></div>
      <div class="cloud-actions"><button class="primary-btn" onclick="cloudSignIn()">Sign In</button><button class="secondary-btn" onclick="cloudSignUp()">Create Account</button></div>`}
    </div>
    <button class="secondary-btn" onclick="closeCloudModal()">Close</button>`;
}
function saveCloudProjectSettings(){
  readCloudInputs(); supabaseClient=null; cloudUser=null; unsubscribeCloudChanges();
  if(!cloudConfigured()) return toast('Enter both the Supabase project URL and public key.');
  configureSupabase(); setCloudStatus('phone','Project settings saved. Sign in next.'); renderCloudModal(); toast('Cloud project settings saved.');
}
async function cloudSignUp(){
  readCloudInputs(); const client=configureSupabase(); if(!client) return toast('Save valid cloud project settings first.');
  const email=document.getElementById('cloudEmail')?.value.trim(),password=document.getElementById('cloudPassword')?.value||'';
  if(!email||password.length<6) return toast('Enter a valid email and a password of at least 6 characters.');
  setCloudStatus('syncing','Creating the family account…');
  const {data,error}=await client.auth.signUp({email,password});
  if(error){setCloudStatus('error',error.message);return toast(error.message);}
  if(data.session){cloudUser=data.user;await syncCloudNow({showToast:true});closeCloudModal();}
  else{setCloudStatus('phone','Check the family email to confirm the account, then sign in.');toast('Check the email confirmation message, then return and sign in.');}
}
async function cloudSignIn(){
  readCloudInputs(); const client=configureSupabase(); if(!client) return toast('Save valid cloud project settings first.');
  const email=document.getElementById('cloudEmail')?.value.trim(),password=document.getElementById('cloudPassword')?.value||'';
  if(!email||!password) return toast('Enter the family email and password.');
  setCloudStatus('syncing','Signing in…');
  const {data,error}=await client.auth.signInWithPassword({email,password});
  if(error){setCloudStatus('error',error.message);return toast(error.message);}
  cloudUser=data.user; await syncCloudNow({showToast:true,preferRemote:!state.setupComplete});
  document.getElementById('onboardingModal').classList.remove('show'); closeCloudModal();
}
async function cloudSignOut(){
  if(supabaseClient) await supabaseClient.auth.signOut(); cloudUser=null;unsubscribeCloudChanges();setCloudStatus('phone','Saved on phone');renderCloudModal();toast('Signed out on this phone.');
}
function scheduleCloudPush(){
  if(!cloudUser||!navigator.onLine) return;
  clearTimeout(cloudPushTimer); cloudPushTimer=setTimeout(()=>pushCloudState(),900);
}
async function pushCloudState(){
  if(!cloudUser||!supabaseClient||cloudSyncInProgress||!navigator.onLine) return;
  cloudSyncInProgress=true; setCloudStatus('syncing','Saving to the family cloud…');
  try{
    const now=new Date().toISOString();
    if(!state.meta.modifiedAt) state.meta.modifiedAt=now;
    const payload=clone(state);
    const {data,error}=await supabaseClient.from('reseller_app_state').upsert({user_id:cloudUser.id,payload,updated_at:now,device_name:cloudConfig.deviceName||'Family phone'},{onConflict:'user_id'}).select('updated_at').single();
    if(error) throw error;
    cloudConfig.lastSyncAt=data?.updated_at||now; saveCloudConfig();
    await ensureDailyCloudBackup();
    setCloudStatus('connected','Cloud synced');
  }catch(e){console.error(e);setCloudStatus(navigator.onLine?'error':'offline',e.message||'Cloud save failed.');}
  finally{cloudSyncInProgress=false;}
}
async function syncCloudNow(options={}){
  if(!navigator.onLine){setCloudStatus('offline','No internet connection.');if(options.showToast)toast('Offline — changes remain safe on this phone.');return;}
  const client=configureSupabase(); if(!client) return setCloudStatus('phone','Saved on phone');
  if(!cloudUser){const {data}=await client.auth.getSession();cloudUser=data.session?.user||null;}
  if(!cloudUser){setCloudStatus('phone','Saved on phone');return;}
  if(cloudSyncInProgress) return;
  cloudSyncInProgress=true; setCloudStatus('syncing','Checking for newer family data…');
  try{
    const {data,error}=await client.from('reseller_app_state').select('payload,updated_at,device_name').eq('user_id',cloudUser.id).maybeSingle();
    if(error) throw error;
    if(!data?.payload){cloudSyncInProgress=false;await pushCloudState();if(options.showToast)toast('This phone created the shared cloud copy.');return;}
    const remote=normalizeState(data.payload),remoteTime=Date.parse(remote.meta?.modifiedAt||data.updated_at||0),localTime=Date.parse(state.meta?.modifiedAt||0);
    if(options.preferRemote||remoteTime>localTime){
      state=remote; localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
      cloudConfig.lastSyncAt=data.updated_at||new Date().toISOString();saveCloudConfig();
      renderHeader();renderActiveScreen(currentScreen);
      document.getElementById('onboardingModal').classList.toggle('show',!state.setupComplete);
      if(options.showToast) toast('Latest family data loaded.');
    }else if(localTime>remoteTime){
      cloudSyncInProgress=false;await pushCloudState();if(options.showToast)toast('This phone’s newer changes were synced.');return;
    }else if(options.showToast) toast('Everything is already up to date.');
    await ensureDailyCloudBackup();setCloudStatus('connected','Cloud synced');
  }catch(e){console.error(e);setCloudStatus(navigator.onLine?'error':'offline',e.message||'Cloud check failed.');if(options.showToast)toast('Cloud sync could not finish. Your phone copy is still safe.');}
  finally{cloudSyncInProgress=false;}
}
async function ensureDailyCloudBackup(){
  if(!cloudUser||!supabaseClient||!navigator.onLine) return;
  const date=today();
  try{
    const {error}=await supabaseClient.from('reseller_app_backups').upsert({user_id:cloudUser.id,backup_date:date,payload:clone(state),state_updated_at:state.meta.modifiedAt||new Date().toISOString(),device_name:cloudConfig.deviceName||'Family phone'},{onConflict:'user_id,backup_date'});
    if(error) throw error;
    cloudConfig.lastBackupDate=date;saveCloudConfig();
  }catch(e){console.error('Daily backup failed',e);}
}
function subscribeCloudChanges(){
  if(!supabaseClient||!cloudUser) return;unsubscribeCloudChanges();
  cloudChannel=supabaseClient.channel(`reseller-family-${cloudUser.id}`).on('postgres_changes',{event:'*',schema:'public',table:'reseller_app_state',filter:`user_id=eq.${cloudUser.id}`},payload=>{
    const incoming=payload.new?.payload;if(!incoming) return;
    const remoteTime=Date.parse(incoming.meta?.modifiedAt||payload.new?.updated_at||0),localTime=Date.parse(state.meta?.modifiedAt||0);
    if(remoteTime>localTime){state=normalizeState(incoming);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));cloudConfig.lastSyncAt=payload.new.updated_at||new Date().toISOString();saveCloudConfig();renderHeader();renderActiveScreen(currentScreen);toast('Updated from another family phone.');}
  }).subscribe();
}
function unsubscribeCloudChanges(){if(cloudChannel&&supabaseClient){supabaseClient.removeChannel(cloudChannel);}cloudChannel=null;}
async function initCloudSync(){
  if(!cloudConfigured()){setCloudStatus('phone','Saved on phone');return;}
  const client=configureSupabase();if(!client)return;
  setCloudStatus('syncing','Connecting…');
  const {data,error}=await client.auth.getSession();
  if(error){setCloudStatus('error',error.message);return;}
  cloudUser=data.session?.user||null;
  if(cloudUser){subscribeCloudChanges();await syncCloudNow({preferRemote:!state.setupComplete});}else setCloudStatus('phone','Project ready — sign in');
  clearInterval(cloudCheckTimer);cloudCheckTimer=setInterval(()=>{if(cloudUser&&navigator.onLine)syncCloudNow();},30000);
}
window.addEventListener('online',()=>{if(cloudUser)syncCloudNow();else setCloudStatus('phone','Saved on phone');});
window.addEventListener('offline',()=>setCloudStatus('offline','No internet connection.'));
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&cloudUser)syncCloudNow();});
async function loadCloudBackups(){
  const box=document.getElementById('cloudBackupList');if(!box)return;
  if(!cloudUser||!supabaseClient){box.innerHTML='<div class="hint">Connect and sign in to Cloud Sync first.</div>';return;}
  box.innerHTML='<div class="hint">Loading cloud backups…</div>';
  const {data,error}=await supabaseClient.from('reseller_app_backups').select('backup_date,state_updated_at,device_name').eq('user_id',cloudUser.id).order('backup_date',{ascending:false}).limit(30);
  if(error){box.innerHTML=`<div class="hint">${esc(error.message)}</div>`;return;}
  box.innerHTML=(data||[]).length?(data||[]).map(b=>`<div class="backup-row"><div><strong>${displayDate(b.backup_date)}</strong><div class="cloud-small">Saved by ${esc(b.device_name||'family phone')}</div></div><button class="mini-btn" onclick="restoreCloudBackup('${esc(b.backup_date)}')">Restore</button></div>`).join(''):'<div class="hint">No cloud snapshots yet.</div>';
}
async function restoreCloudBackup(date){
  if(!cloudUser||!supabaseClient||!confirm(`Restore the cloud backup from ${displayDate(date)}? Current data will be replaced.`))return;
  const {data,error}=await supabaseClient.from('reseller_app_backups').select('payload').eq('user_id',cloudUser.id).eq('backup_date',date).single();
  if(error||!data?.payload)return toast('That cloud backup could not be loaded.');
  state=normalizeState(data.payload);state.meta.modifiedAt=new Date().toISOString();saveState();renderActiveScreen(currentScreen);toast('Cloud backup restored and synced.');
}
function renderBackup(){
  const el=document.getElementById('parentBackup'); if(!el) return;
  const connected=Boolean(cloudUser),lastSync=cloudConfig.lastSyncAt?new Date(cloudConfig.lastSyncAt).toLocaleString():'Not synced yet';
  el.innerHTML=`
    <div class="form-card cloud-status-card"><div class="cloud-status-row"><div><h3 style="margin:0 0 5px"><span class="cloud-dot ${connected?'connected':cloudStatus==='syncing'?'syncing':cloudStatus==='error'?'error':''}"></span>${connected?'Family cloud is connected':'Connect family cloud sync'}</h3><div class="cloud-small">${connected?`All signed-in phones share one current copy. Last sync: ${esc(lastSync)}.`:'Connect once on each phone using the same family account.'}</div></div><button class="mini-btn" onclick="openCloudModal()">${connected?'Manage':'Connect'}</button></div>${connected?`<div class="cloud-actions"><button class="primary-btn" onclick="syncCloudNow({showToast:true})">Check & Sync Now</button><button class="secondary-btn" onclick="loadCloudBackups()">View Daily Backups</button></div><div id="cloudBackupList" style="margin-top:8px"></div>`:''}</div>
    <div class="coach-card ${connected?'':'backup-warning'}"><h3>${connected?'Automatic protection':'Important'}</h3><p>${connected?'Every saved change is sent to the shared cloud, and one restorable snapshot is maintained for each day the app is opened or changed. If a phone is offline, it saves locally and catches up when internet returns.':'Until Cloud Sync is connected, data exists only in this browser. Download a manual backup regularly.'}</p></div>
    <div class="form-card"><h3>Manual backup and export</h3><button class="primary-btn" onclick="exportBackup()">Download Complete Backup</button><div class="inline-actions"><button class="secondary-btn" onclick="exportCSV('purchases')">Purchases CSV</button><button class="secondary-btn" onclick="exportCSV('sales')">Sales CSV</button><button class="secondary-btn" onclick="exportCSV('trades')">Trades CSV</button><button class="secondary-btn" onclick="exportCSV('expenses')">Expenses CSV</button><button class="secondary-btn" onclick="exportCSV('money')">Money CSV</button><button class="secondary-btn" onclick="exportCSV('quotes')">Quotes CSV</button><button class="secondary-btn" onclick="exportCSV('ledger')">Ledger CSV</button></div><div class="hint">Last manual backup: ${state.settings.lastBackup?displayDate(state.settings.lastBackup):'None recorded'}</div></div>
    <div class="form-card"><h3>Restore a downloaded backup</h3><label class="file-btn">Choose Backup File<input type="file" accept="application/json,.json" onchange="importBackup(event)"></label><div class="hint">Restoring replaces current data and then syncs the restored copy to the family cloud.</div></div>
    <div class="form-card"><h3>Recommended hosting</h3><p class="hint" style="font-size:12px">Host these app files with GitHub Pages so every phone opens the same web address and can add it to the home screen. GitHub hosts the app code; Supabase securely stores and syncs the business data.</p></div>
    <div class="form-card" style="border:1px solid #ffd5d5"><h3 style="color:var(--red)">Reset this phone</h3><p class="hint">Download a backup first. When cloud sync is connected, resetting only this phone does not erase the cloud copy unless the blank state is saved afterward.</p><button class="secondary-btn" style="background:#ffe8e8;color:var(--red)" onclick="resetApp()">Erase Local App Data</button></div>`;
}
function downloadBlob(content,type,filename){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportBackup(){
  state.settings.lastBackup=today(); saveState();
  downloadBlob(JSON.stringify(state,null,2),'application/json',`${safeName(state.settings.businessName)}_backup_${today()}.json`); toast('Complete backup downloaded.'); renderParent();
}
function safeName(s){ return String(s||'reseller').replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,''); }
function csvEscape(v){ const s=String(v??''); return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s; }
function exportCSV(type){
  let rows=[];
  if(type==='purchases') rows=[['Entry ID','Product Line ID','Item ID','Product Key','Date','Source Type','Item Name','Category','Variant','Quantity','Cash Cost','Labor Hours','Labor Rate','Labor Value','Tracked Total Cost','Unit Cost','Estimated Value Each','Paid By','Source','Trade ID','Notes'],...state.purchases.map(p=>[p.purchaseId,p.productLineId||'',p.itemId,productKeyFor(p),p.date,p.sourceType||'Purchased',p.name,p.category,p.variant,p.qty,inventoryCashCost(p),p.laborHours||0,p.laborRate||0,p.laborValue||0,p.totalCost,p.unitCost,p.estimatedValueEach||'',p.paidBy,p.source,p.tradeId||'',p.notes])];
  if(type==='sales') rows=[['Sale ID','Date','Status','Platform','Pricing Mode','Order Item Total','Delivery','Delivery Location','Delivery Fee','Gas Cost','Gas Paid By','Product','Variation','Quantity','Allocated Item Sales','Effective Price Each','Fees','Shipping','Packaging','COGS','Item Profit','Margin %','Inventory Lots Used','Order Gross','Order Profit After Gas','Notes'],...state.sales.flatMap(s=>s.lines.map(l=>{const c=computeLine(l),info=saleLineProduct(l),sc=computeSale(s);return [s.saleId,s.date,s.status,s.platform,s.pricingMode||'line',s.orderItemTotal||'',s.delivery?'Yes':'No',s.deliveryLocation||'',s.deliveryFee||0,s.gasCost||0,s.gasPaidBy||'',info.name,info.variant,l.qty,c.gross,num(l.qty)?c.gross/num(l.qty):0,c.fees,c.shipping,c.packaging,c.cogs,c.profit,c.margin,saleLineAllocations(l).map(a=>`${a.itemId}:${a.qty}@${a.unitCost}`).join(' | '),sc.gross,sc.profitAfterDelivery,s.notes]}))];
  if(type==='trades') rows=[['Trade ID','Date','Partner','Direction','Item ID','Item Name','Quantity','Value Each','Total Value','Disposition','Notes'],...state.trades.flatMap(t=>[...(t.giveLines||[]).map(l=>{const p=getPurchase(l.itemId);return [t.tradeId,t.date,t.partner,'Given',l.itemId,p?.name||'',l.qty,l.valueEach,num(l.qty)*num(l.valueEach),'',t.notes]}),...(t.receiveLines||[]).map(l=>[t.tradeId,t.date,t.partner,'Received','',l.name,l.qty,l.valueEach,num(l.qty)*num(l.valueEach),l.disposition,l.notes||t.notes])])];
  if(type==='expenses') rows=[['Expense ID','Date','Category','Description','Amount','Paid By','Vendor','Linked Sale','Notes'],...state.expenses.map(e=>[e.expenseId,e.date,e.category,e.description,e.amount,e.paidBy,e.vendor,e.linkedSaleId||'',e.notes])];
  if(type==='money') rows=[['Money ID','Date','Type','Amount','Method','Notes'],...state.money.map(m=>[m.moneyId,m.date,m.type,m.amount,m.method,m.notes])];
  if(type==='quotes') rows=[['Quote ID','Date','Customer / Handle','Title','Item','Variation','Quantity','Expected Cost Each','Customer Price Each','Line Total','Expected Profit','Expected Margin %','Selected Target','Notes'],...state.quotes.flatMap(q=>(q.lines||[]).map(l=>{const m=quoteLineMetrics(l,q);return [q.quoteId,q.date,q.customer,q.title,l.name,l.variant,l.qty,l.costEach,m.priceEach,m.gross,m.profit,m.margin,q.targetChoice==='custom'?q.customMargin:q.targetChoice,q.notes]}))];
  if(type==='ledger') rows=[['Date','Type','Transaction ID','Description','Details','Amount','Direction'],...transactionLedger().map(r=>[r.date,r.badge,r.id,r.title,r.detail,r.amount,r.sign<0?'Out':r.sign>0?'In':'Non-cash'])];
  downloadBlob(rows.map(r=>r.map(csvEscape).join(',')).join('\n'),'text/csv',`${safeName(state.settings.businessName)}_${type}_${today()}.csv`); toast(`${type} CSV downloaded.`);
}

function importBackup(event){
  const file=event.target.files?.[0]; if(!file) return;
  const reader=new FileReader(); reader.onload=()=>{
    try {
      const incoming=JSON.parse(reader.result);
      if(!incoming.settings||!Array.isArray(incoming.purchases)||!Array.isArray(incoming.sales)) throw new Error('Invalid');
      if(!Array.isArray(incoming.trades)) incoming.trades=[];
      if(!confirm('Replace all current data with this backup?')) return;
      state=normalizeState(incoming);
      saveState(); parentUnlocked=false; toast('Backup restored.'); showScreen('homeScreen');
    } catch(e){ toast('That file is not a valid backup.'); }
  }; reader.readAsText(file);
}
function resetApp(){
  const phrase=prompt('Type ERASE to permanently remove all app data.'); if(phrase!=='ERASE') return;
  localStorage.removeItem(STORAGE_KEY); state=clone(DEFAULT_STATE); parentUnlocked=false; purchaseDraft=[]; createdDraft=[]; tradeGiveDraft=[]; tradeReceiveDraft=[]; saleDraft=[]; quoteDraft=[]; quoteMeta=null; quotePreview=null; quoteViewingId=''; expenseDraft={date:'',category:'Packaging',description:'',amount:'',paidBy:'Business Cash',vendor:'',notes:''}; editingPurchaseId=''; editingTradeId=''; editingSaleId=''; editingExpenseId=''; editingMoneyId=''; editingQuoteId=''; purchaseMeta={date:'',paidBy:'Parent Loan',source:''}; createdMeta={date:'',paidBy:'Parent Loan'}; tradeMeta={date:'',partner:'',notes:''}; saleMeta={date:'',status:'Paid',platform:'Instagram',notes:'',pricingMode:'line',orderItemTotal:'',delivery:false,deliveryLocation:'',deliveryFee:'',gasCost:'',gasPaidBy:'Business Cash'}; localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); location.reload();
}

function finishSetup(){
  const business=document.getElementById('setupBusiness').value.trim(), daughter=document.getElementById('setupDaughter').value.trim(), parent=document.getElementById('setupParent').value.trim(), pin=document.getElementById('setupPin').value.trim();
  if(!business) return toast('Enter the business name.'); if(!daughter) return toast('Enter her first name.'); if(!/^\d{4}$/.test(pin)) return toast('Create a 4-digit parent PIN.');
  Object.assign(state.settings,{businessName:business,daughterName:daughter,parentName:parent||'Parent',pin,startingLoan:num(document.getElementById('setupLoan').value)}); state.setupComplete=true; saveState(); document.getElementById('onboardingModal').classList.remove('show'); renderHome(); toast('Her reseller app is ready! ✨');
}
function init(){
  initNavigationHistory(); renderHeader(); renderHome();
  if(!state.setupComplete) document.getElementById('onboardingModal').classList.add('show'); else document.getElementById('onboardingModal').classList.remove('show');
  initCloudSync();
  if('serviceWorker' in navigator&&location.protocol.startsWith('http')) navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
}

init();
</script>
</body>
